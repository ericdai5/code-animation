<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Transition Animator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="noise"></div>
<div class="app">
  <div class="header">
    <h1>Code <em>Transition</em> Animator</h1>
    <p>Add a series of code snapshots and watch each transition animate in sequence.</p>
  </div>

  <div class="steps-container" id="stepsContainer">
    <div class="steps-tabs" id="stepsTabs"></div>
    <div class="steps-panels" id="stepsPanels"></div>
    <button class="btn btn-add" id="addStepBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Step
    </button>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="animateBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Animate All
    </button>
    <button class="btn btn-ghost" id="resetBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Reset
    </button>
    <div class="speed-w">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
      <span class="speed-v" id="speedVal">1.0x</span>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-bar">
      <span class="ttl"><span class="live-dot" id="liveDot"></span>Preview</span>
      <span class="step-indicator" id="stepIndicator"></span>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="canvas-container">
      <canvas id="codeCanvas"></canvas>
    </div>
  </div>
</div>

<script src="app.js?v=4"></script>
</body>
</html>
